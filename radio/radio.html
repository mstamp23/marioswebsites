<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Purple Pro v18</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --surface: #0f0f0f; --surface2: #141414;
            --accent: #a371ff; --accent-dim: #3d2870; --accent-glow: rgba(163,113,255,0.12);
            --text: #c8c8c8; --text-dim: #555; --border: #1e1e1e; --border2: #2a2a2a;
            --fav: #ffcc00; --error: #ff4444; --green: #3dff8f; --green-bg: #0d2e1c;
        }
        *, *::before, *::after { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'IBM Plex Sans', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }

        header {
            display: flex; align-items: center; padding: 0 10px;
            background: #000; border-bottom: 1px solid var(--border);
            height: 58px; gap: 8px; flex-shrink: 0;
        }
        .nav-grp { display: flex; gap: 3px; flex-shrink: 0; }
        .nav-btn {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--accent); cursor: pointer; border-radius: 3px;
            padding: 0 10px; height: 34px; font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem; font-weight: 600; letter-spacing: 0.04em;
            transition: background 0.15s, border-color 0.15s; white-space: nowrap;
        }
        .nav-btn:hover { background: var(--accent-dim); border-color: var(--accent); }
        .nav-btn:active { transform: scale(0.96); }

        #search {
            flex: 1; min-width: 60px; background: var(--surface); border: 1px solid var(--border);
            color: var(--text); padding: 0 10px; height: 34px; border-radius: 3px;
            font-family: 'IBM Plex Sans', sans-serif; font-size: 0.82rem; transition: border-color 0.2s;
        }
        #search:focus { border-color: var(--accent-dim); }
        #search::placeholder { color: var(--text-dim); }

        .mini-player {
            display: flex; align-items: center; gap: 8px;
            background: #0a0a0a; padding: 0 10px; height: 42px; border-radius: 4px;
            border: 1px solid var(--accent-dim); flex: 2.5; min-width: 0;
            position: relative; overflow: hidden;
        }
        .mini-player.playing::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
            animation: sweep 3s linear infinite; pointer-events: none;
        }
        @keyframes sweep { from { transform: translateX(-100%); } to { transform: translateX(200%); } }

        .now-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
        #now-name {
            font-size: 0.82rem; color: var(--accent); font-weight: 700;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        #now-name.offline { color: var(--error); }

        #rds-bar { display: none; align-items: center; gap: 5px; height: 13px; }
        .rds-badge {
            font-family: 'IBM Plex Mono', monospace; font-size: 0.52rem; color: var(--green);
            background: var(--green-bg); border: 1px solid #1a5e30;
            padding: 1px 4px; border-radius: 2px; flex-shrink: 0;
        }
        #rds-text {
            font-size: 0.66rem; color: var(--green); white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; flex: 1; transition: opacity 0.35s;
        }
        #rds-text.fade { opacity: 0; }

        .spinner {
            width: 9px; height: 9px; flex-shrink: 0;
            border: 2px solid var(--accent-dim); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.55s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .play-btn {
            background: var(--accent); border: none; color: #000;
            font-family: 'IBM Plex Mono', monospace; font-weight: 700;
            font-size: 0.62rem; letter-spacing: 0.06em;
            padding: 0 12px; height: 28px; cursor: pointer; border-radius: 2px; flex-shrink: 0;
            transition: background 0.15s;
        }
        .play-btn:hover { background: #b98aff; }
        .play-btn:active { transform: scale(0.95); }

        #vol-slider { width: 58px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }

        #toast {
            position: fixed; bottom: 16px; left: 50%;
            transform: translateX(-50%) translateY(70px);
            background: #1a1a1a; border: 1px solid var(--border2);
            color: var(--text); padding: 8px 16px; border-radius: 4px;
            font-size: 0.78rem; font-family: 'IBM Plex Mono', monospace;
            transition: transform 0.3s ease; z-index: 999; pointer-events: none;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        #cat-bar {
            background: #000; padding: 8px 10px; border-bottom: 1px solid var(--border);
            display: flex; gap: 6px; overflow-x: auto; white-space: nowrap;
            scrollbar-width: none; flex-shrink: 0;
        }
        #cat-bar::-webkit-scrollbar { display: none; }
        .cat-chip {
            background: var(--surface); border: 1px solid var(--border);
            padding: 5px 12px; border-radius: 20px; font-size: 0.72rem;
            cursor: pointer; color: #666; transition: all 0.15s; user-select: none;
        }
        .cat-chip:hover { color: var(--text); border-color: #333; }
        .cat-chip.active { background: var(--accent-dim); color: #fff; border-color: var(--accent); }

        #content { flex: 1; overflow-y: auto; padding: 10px; }
        #content::-webkit-scrollbar { width: 4px; }
        #content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        .cat-section { margin-bottom: 20px; }
        .cat-head {
            font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; font-weight: 600;
            color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em;
            margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
        }
        .cat-head::after { content: ''; flex: 1; height: 1px; background: var(--accent-dim); opacity: 0.3; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 6px; }

        .card {
            background: var(--surface); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 9px 10px; border-radius: 5px; cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .card:hover { border-color: var(--border2); background: var(--surface2); }
        .card.active { border-color: var(--accent) !important; background: #160f2a !important; }
        .card.error { border-color: var(--error) !important; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .card.retrying { animation: pulse 1s ease infinite; }

        .st-name { font-size: 0.78rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .fav-btn { color: #2a2a2a; font-size: 1.1rem; padding: 0 2px; transition: color 0.15s; flex-shrink: 0; }
        .fav-btn:hover { color: #888; }
        .fav-btn.on { color: var(--fav); }

        #hint { position: fixed; bottom: 6px; right: 10px; font-family: 'IBM Plex Mono', monospace; font-size: 0.52rem; color: #2a2a2a; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <div class="nav-grp">
        <button class="nav-btn" onclick="prevNext(-1)" title="Previous (←)">◀◀</button>
        <button class="nav-btn" onclick="prevNext(1)"  title="Next (→)">▶▶</button>
    </div>
    <input type="search" id="search" placeholder="Search stations…" oninput="renderFilter()" autocomplete="off" spellcheck="false">
    <div class="mini-player" id="mini-player">
        <div class="spinner" id="spinner"></div>
        <div class="now-col">
            <div id="now-name">OFFLINE</div>
            <div id="rds-bar">
                <span class="rds-badge">RDS</span>
                <span id="rds-text">—</span>
            </div>
        </div>
        <button class="play-btn" id="btn-play" onclick="togglePlay()">PLAY</button>
        <input type="range" id="vol-slider" min="0" max="1" step="0.02" value="0.7"
               oninput="setVol(this.value)" title="Volume">
    </div>
</header>

<div id="cat-bar"></div>
<div id="content"><div id="grid-root"></div></div>

<audio id="player" preload="none"></audio>
<div id="toast"></div>
<div id="hint">SPACE play/pause · ← → prev/next</div>

<script>
'use strict';

const player     = document.getElementById('player');
const nowName    = document.getElementById('now-name');
const spinnerEl  = document.getElementById('spinner');
const playBtn    = document.getElementById('btn-play');
const rdsBar     = document.getElementById('rds-bar');
const rdsText    = document.getElementById('rds-text');
const miniPlayer = document.getElementById('mini-player');
const toastEl    = document.getElementById('toast');

let stations       = [];
let currentStation = null;
let currentCat     = 'ALL';
let favorites      = [];
let rdsTimer       = null;
let retryTimer     = null;
let retryCount     = 0;
const MAX_RETRY    = 3;

try { favorites = JSON.parse(localStorage.getItem('radio_favs') || '[]'); } catch(_) {}

// ── VOLUME ────────────────────────────────────────────────────────────
function setVol(v) { player.volume = parseFloat(v); }
setVol(0.7);

// ── TOAST ─────────────────────────────────────────────────────────────
let _toastTimer;
function showToast(msg, ms = 3000) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms);
}

// ── UI STATES ─────────────────────────────────────────────────────────
function uiLoading(name) {
    nowName.className = '';
    nowName.textContent = name;
    spinnerEl.style.display = 'inline-block';
    playBtn.textContent = 'PAUSE';
    miniPlayer.classList.add('playing');
}
function uiPlaying(name) {
    nowName.textContent = name;
    spinnerEl.style.display = 'none';
    playBtn.textContent = 'PAUSE';
}
function uiStopped() {
    spinnerEl.style.display = 'none';
    playBtn.textContent = 'PLAY';
    miniPlayer.classList.remove('playing');
    clearRDS();
}
function uiError(name) {
    nowName.className = 'offline';
    nowName.textContent = name ? '✕ ' + name : 'STREAM OFFLINE';
    uiStopped();
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
}

// ── RDS ───────────────────────────────────────────────────────────────
function setRDS(text) {
    if (!text) return;
    rdsBar.style.display = 'flex';
    rdsText.classList.add('fade');
    setTimeout(function() { rdsText.textContent = text; rdsText.classList.remove('fade'); }, 350);
}
function clearRDS() { rdsBar.style.display = 'none'; rdsText.textContent = '—'; }
function stopPolling() { clearInterval(rdsTimer); rdsTimer = null; }

async function fetchMeta(station) {
    try {
        const u = new URL(station.streamer);
        if (u.hostname.includes('radiojar.com')) {
            const id = u.pathname.split('/').filter(Boolean)[0];
            if (id) {
                const r = await fetch(u.origin + '/' + id + '/now-playing/', { signal: AbortSignal.timeout(5000) });
                if (r.ok) {
                    const d = await r.json();
                    const s = d && (d.song || (d.now_playing && d.now_playing.song));
                    if (s) return [s.artist, s.title].filter(Boolean).join(' — ') || null;
                    if (d && d.title) return d.title;
                }
            }
        }
    } catch(_) {}
    const ms = navigator.mediaSession && navigator.mediaSession.metadata;
    if (ms && ms.title && ms.title !== station.name) return [ms.artist, ms.title].filter(Boolean).join(' — ') || null;
    return null;
}

function startPolling(station) {
    stopPolling();
    clearRDS();
    async function poll() {
        if (!currentStation || currentStation.id !== station.id || document.hidden) return;
        const m = await fetchMeta(station);
        if (m && currentStation && currentStation.id === station.id) setRDS(m);
    }
    poll();
    rdsTimer = setInterval(poll, 14000);
}

// ── MEDIA SESSION ─────────────────────────────────────────────────────
function setupMediaSession(station) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({ title: station.name, artist: station.category || 'Radio' });
    navigator.mediaSession.playbackState = 'playing';
    try { navigator.mediaSession.setActionHandler('play', togglePlay); } catch(_) {}
    try { navigator.mediaSession.setActionHandler('pause', togglePlay); } catch(_) {}
    try { navigator.mediaSession.setActionHandler('previoustrack', function() { prevNext(-1); }); } catch(_) {}
    try { navigator.mediaSession.setActionHandler('nexttrack', function() { prevNext(1); }); } catch(_) {}
}

// ── RETRY ─────────────────────────────────────────────────────────────
function stopRetry() { clearTimeout(retryTimer); retryTimer = null; retryCount = 0; }

function scheduleRetry(station) {
    if (retryCount >= MAX_RETRY) {
        showToast('Stream unavailable: ' + station.name, 5000);
        uiError(station.name);
        setCardState(station.id, 'error');
        return;
    }
    retryCount++;
    showToast('Reconnecting... (' + retryCount + '/' + MAX_RETRY + ')');
    setCardState(station.id, 'retrying');
    retryTimer = setTimeout(function() {
        if (!currentStation || currentStation.id !== station.id) return;
        player.src = station.streamer;
        player.load();
        player.play().catch(function() { scheduleRetry(station); });
    }, 3000 * retryCount);
}

function setCardState(id, cls) {
    document.querySelectorAll('.card').forEach(function(c) {
        if (c.dataset.id == id) { c.classList.remove('retrying','error'); c.classList.add(cls); }
    });
}

// ── ENGINE EVENTS ─────────────────────────────────────────────────────
player.addEventListener('error', function() { if (currentStation) scheduleRetry(currentStation); });
player.addEventListener('stalled', function() { if (currentStation) scheduleRetry(currentStation); });

// ── PLAY STATION ──────────────────────────────────────────────────────
function playStation(station) {
    stopRetry();
    stopPolling();

    player.pause();
    player.src = station.streamer;
    player.load();

    currentStation = station;
    retryCount = 0;
    try { localStorage.setItem('radio_last_id', station.id); } catch(_) {}

    updateActiveUI(station.id);
    uiLoading(station.name);
    setupMediaSession(station);

    player.play()
        .then(function() {
            uiPlaying(station.name);
            startPolling(station);
        })
        .catch(function(err) {
            if (err && err.name === 'NotAllowedError') {
                // Autoplay blocked — show station name, wait for user to press play
                uiStopped();
                nowName.textContent = station.name;
                nowName.className = '';
            } else {
                scheduleRetry(station);
            }
        });
}

// ── TOGGLE ────────────────────────────────────────────────────────────
function togglePlay() {
    if (!currentStation) return;
    if (player.paused) {
        if (!player.src || player.src === window.location.href) {
            player.src = currentStation.streamer;
            player.load();
        }
        spinnerEl.style.display = 'inline-block';
        player.play()
            .then(function() {
                spinnerEl.style.display = 'none';
                playBtn.textContent = 'PAUSE';
                miniPlayer.classList.add('playing');
                nowName.className = '';
                nowName.textContent = currentStation.name;
            })
            .catch(function() { spinnerEl.style.display = 'none'; });
    } else {
        player.pause();
        uiStopped();
        nowName.textContent = currentStation.name;
        nowName.className = '';
    }
}

// ── PREV / NEXT ───────────────────────────────────────────────────────
function prevNext(dir) {
    var list = getFilteredList();
    if (!list.length) return;
    var lastId = currentStation ? currentStation.id : null;
    if (!lastId) { try { lastId = localStorage.getItem('radio_last_id'); } catch(_) {} }
    var idx = list.findIndex(function(s) { return s.id && s.id.toString() === (lastId && lastId.toString()); });
    idx = idx === -1 ? 0 : (idx + dir + list.length) % list.length;
    playStation(list[idx]);
}

function updateActiveUI(id) {
    document.querySelectorAll('.card').forEach(function(c) {
        c.classList.toggle('active', c.dataset.id == id);
        if (c.dataset.id != id) c.classList.remove('retrying','error');
    });
}

// ── KEYBOARD ──────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
    if (document.activeElement.tagName === 'INPUT') return;
    if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowLeft')  { e.preventDefault(); prevNext(-1); }
    if (e.code === 'ArrowRight') { e.preventDefault(); prevNext(1); }
});

document.addEventListener('visibilitychange', function() {
    if (!document.hidden && currentStation && !player.paused) startPolling(currentStation);
});

// ── DATA ──────────────────────────────────────────────────────────────
function cleanStr(s) { return (s || '').replace(/\u00a0/g,' ').replace(/\s+/g,' ').trim(); }

async function loadData() {
    try {
        var r = await fetch('./greek_stations.json');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        var raw = await r.json();
        stations = raw.map(function(s, i) {
            return {
                id:       s.sid != null ? s.sid : ('g' + i),
                name:     cleanStr(s.name),
                streamer: (s.streamer || '').trim(),
                category: cleanStr(s.category) || 'Άλλα'
            };
        }).sort(function(a, b) { return a.name.localeCompare(b.name, 'el'); });

        buildCatBar();
        render();

        var lastId = null;
        try { lastId = localStorage.getItem('radio_last_id'); } catch(_) {}
        if (lastId) {
            var s = stations.find(function(x) { return x.id.toString() === lastId.toString(); });
            if (s) { currentStation = s; nowName.textContent = s.name; updateActiveUI(s.id); }
        }
    } catch(e) {
        showToast('Could not load stations', 6000);
        console.error('[Radio] loadData:', e);
    }
}

// ── CATEGORIES ────────────────────────────────────────────────────────
function buildCatBar() {
    var cats = ['ALL', '⭐ ΑΓΑΠΗΜΕΝΑ'].concat(
        Array.from(new Set(stations.map(function(s) { return s.category; }))).sort(function(a,b) { return a.localeCompare(b,'el'); })
    );
    var bar = document.getElementById('cat-bar');
    bar.innerHTML = '';
    cats.forEach(function(c) {
        var chip = document.createElement('div');
        chip.className = 'cat-chip' + (c === currentCat ? ' active' : '');
        chip.textContent = c;
        chip.addEventListener('click', function() { setCategory(c); });
        bar.appendChild(chip);
    });
}

function setCategory(cat) {
    currentCat = cat;
    buildCatBar();
    render();
    document.getElementById('content').scrollTop = 0;
}

// ── FAVORITES ─────────────────────────────────────────────────────────
function toggleFav(e, name) {
    e.stopPropagation();
    favorites = favorites.includes(name) ? favorites.filter(function(f) { return f !== name; }) : favorites.concat([name]);
    try { localStorage.setItem('radio_favs', JSON.stringify(favorites)); } catch(_) {}
    render();
}

// ── FILTERING ─────────────────────────────────────────────────────────
function getFilteredList() {
    var q = document.getElementById('search').value.toLowerCase().trim();
    var list;
    if (currentCat === '⭐ ΑΓΑΠΗΜΕΝΑ') {
        var seen = new Set();
        list = stations.filter(function(s) { return favorites.includes(s.name) && !seen.has(s.name) && seen.add(s.name); });
    } else if (currentCat === 'ALL') {
        list = stations;
    } else {
        list = stations.filter(function(s) { return s.category === currentCat; });
    }
    if (!q) return list;
    return list.filter(function(s) { return s.name.toLowerCase().includes(q) || s.category.toLowerCase().includes(q); });
}

function renderFilter() { render(); }

// ── RENDER ────────────────────────────────────────────────────────────
var CAT_PRIORITY = { 'Αθήνα': 1, 'Θεσσαλονίκη': 2 };

function render() {
    var list = getFilteredList();
    var root = document.getElementById('grid-root');
    root.innerHTML = '';

    if (currentCat === '⭐ ΑΓΑΠΗΜΕΝΑ') {
        appendSection('⭐ ΤΑ ΑΓΑΠΗΜΕΝΑ ΜΟΥ', list, root);
        return;
    }
    var groups = {};
    list.forEach(function(s) { (groups[s.category] = groups[s.category] || []).push(s); });
    Object.keys(groups)
        .sort(function(a,b) { return ((CAT_PRIORITY[a]||999) - (CAT_PRIORITY[b]||999)) || a.localeCompare(b,'el'); })
        .forEach(function(cat) { appendSection(cat, groups[cat], root); });
}

function appendSection(title, list, container) {
    if (!list.length) return;
    var lastId = null;
    try { lastId = localStorage.getItem('radio_last_id'); } catch(_) {}

    var sec = document.createElement('div');
    sec.className = 'cat-section';

    var head = document.createElement('div');
    head.className = 'cat-head';
    head.textContent = title + ' (' + list.length + ')';
    sec.appendChild(head);

    var grid = document.createElement('div');
    grid.className = 'grid';

    list.forEach(function(s) {
        var card = document.createElement('div');
        var isActive = (currentStation && currentStation.id == s.id) || (lastId == s.id);
        card.className = 'card' + (isActive ? ' active' : '');
        card.dataset.id = s.id;

        var name = document.createElement('span');
        name.className = 'st-name';
        name.textContent = s.name;

        var fav = document.createElement('span');
        fav.className = 'fav-btn' + (favorites.includes(s.name) ? ' on' : '');
        fav.textContent = '★';
        fav.addEventListener('click', function(e) { toggleFav(e, s.name); });

        card.appendChild(name);
        card.appendChild(fav);
        card.addEventListener('click', function() { playStation(s); });
        grid.appendChild(card);
    });

    sec.appendChild(grid);
    container.appendChild(sec);
}

// ── BOOT ──────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Purple Pro v18</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --surface: #0f0f0f; --surface2: #141414;
            --accent: #a371ff; --accent-dim: #3d2870; --accent-glow: rgba(163,113,255,0.15);
            --text: #c8c8c8; --text-dim: #555; --border: #1e1e1e; --border-bright: #2a2a2a;
            --fav: #ffcc00; --error: #ff4444; --green: #3dff8f; --green-dim: #0d2e1c;
            --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--sans);
            background: var(--bg); color: var(--text);
            margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* ── HEADER ── */
        header {
            display: flex; align-items: center; padding: 0 10px;
            background: #000; border-bottom: 1px solid var(--border);
            height: 58px; gap: 8px; flex-shrink: 0; z-index: 10;
        }

        .nav-grp { display: flex; gap: 3px; flex-shrink: 0; }
        .nav-btn {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--accent); cursor: pointer; border-radius: 3px;
            padding: 0 10px; height: 34px; font-family: var(--mono); font-size: 0.65rem;
            font-weight: 600; letter-spacing: 0.04em; transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        .nav-btn:hover { background: var(--accent-dim); border-color: var(--accent); }
        .nav-btn:active { transform: scale(0.96); }

        #search {
            flex: 1; min-width: 60px; background: var(--surface); border: 1px solid var(--border);
            color: var(--text); padding: 0 10px; height: 34px; border-radius: 3px;
            font-family: var(--sans); font-size: 0.82rem;
            transition: border-color 0.2s;
        }
        #search:focus { border-color: var(--accent-dim); }
        #search::placeholder { color: var(--text-dim); }

        /* ── MINI PLAYER ── */
        .mini-player {
            display: flex; align-items: center; gap: 8px;
            background: #0a0a0a; padding: 0 10px; height: 42px; border-radius: 4px;
            border: 1px solid var(--accent-dim); flex: 2.5; min-width: 0;
            position: relative; overflow: hidden;
        }
        /* subtle animated glow on the playing card */
        .mini-player.playing::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent 0%, var(--accent-glow) 50%, transparent 100%);
            animation: sweep 3s linear infinite; pointer-events: none;
        }
        @keyframes sweep { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

        .now-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }

        #now-name {
            font-size: 0.82rem; color: var(--accent); font-weight: 700;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        #now-name.offline { color: var(--error); }

        #rds-bar { display: none; align-items: center; gap: 5px; height: 13px; }
        .rds-badge {
            font-family: var(--mono); font-size: 0.52rem; color: var(--green);
            background: var(--green-dim); border: 1px solid #1a5e30;
            padding: 1px 4px; border-radius: 2px; flex-shrink: 0; letter-spacing: 0.05em;
        }
        #rds-text {
            font-size: 0.66rem; color: var(--green); white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; flex: 1;
            transition: opacity 0.35s;
        }
        #rds-text.fade { opacity: 0; }

        /* Spinner */
        .spinner {
            width: 9px; height: 9px; border: 2px solid var(--accent-dim);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.55s linear infinite; flex-shrink: 0; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error flash */
        @keyframes errflash { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        #now-name.flash-err { animation: errflash 0.35s ease 3; }

        .play-btn {
            background: var(--accent); border: none; color: #000;
            font-family: var(--mono); font-weight: 700; font-size: 0.62rem; letter-spacing: 0.06em;
            padding: 0 12px; height: 28px; cursor: pointer; border-radius: 2px; flex-shrink: 0;
            transition: background 0.15s, transform 0.1s;
        }
        .play-btn:hover { background: #b98aff; }
        .play-btn:active { transform: scale(0.95); }

        #vol-slider {
            width: 58px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%) translateY(60px);
            background: var(--error); color: #fff; padding: 8px 16px;
            border-radius: 4px; font-size: 0.78rem; font-family: var(--mono);
            transition: transform 0.3s ease; z-index: 999; pointer-events: none; white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* ── CAT BAR ── */
        #cat-bar {
            background: #000; padding: 8px 10px; border-bottom: 1px solid var(--border);
            display: flex; gap: 6px; overflow-x: auto; white-space: nowrap;
            scrollbar-width: none; flex-shrink: 0;
        }
        #cat-bar::-webkit-scrollbar { display: none; }
        .cat-chip {
            background: var(--surface); border: 1px solid var(--border);
            padding: 5px 12px; border-radius: 20px; font-size: 0.72rem; cursor: pointer; color: #666;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .cat-chip:hover { color: var(--text); border-color: #333; }
        .cat-chip.active { background: var(--accent-dim); color: #fff; border-color: var(--accent); }

        /* ── CONTENT ── */
        #content { flex: 1; overflow-y: auto; padding: 10px; scroll-behavior: smooth; }
        #content::-webkit-scrollbar { width: 4px; }
        #content::-webkit-scrollbar-track { background: transparent; }
        #content::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

        .cat-section { margin-bottom: 22px; }
        .cat-head {
            font-family: var(--mono); font-size: 0.58rem; font-weight: 600; color: var(--accent);
            text-transform: uppercase; letter-spacing: 0.1em;
            margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
        }
        .cat-head::after { content: ''; flex: 1; height: 1px; background: var(--accent-dim); opacity: 0.35; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 6px; }

        .card {
            background: var(--surface); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 9px 10px; border-radius: 5px; cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .card:hover { border-color: var(--border-bright); background: var(--surface2); }
        .card.active { border-color: var(--accent) !important; background: #160f2a !important; }
        .card.preloading { border-color: var(--accent-dim); }
        .card.error { border-color: var(--error) !important; }

        .st-name { font-size: 0.78rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .fav-btn { color: #2a2a2a; font-size: 1.1rem; padding: 0 2px; transition: color 0.15s; flex-shrink: 0; }
        .fav-btn:hover { color: #888; }
        .fav-btn.on { color: var(--fav); }

        /* ── RETRY INDICATOR ── */
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .card.retrying { animation: pulse 1s ease infinite; }

        /* keyboard shortcut hint */
        #hint {
            position: fixed; bottom: 6px; right: 10px;
            font-family: var(--mono); font-size: 0.52rem; color: #333;
            pointer-events: none;
        }
    </style>
</head>
<body>

<header>
    <div class="nav-grp">
        <button class="nav-btn" id="btn-prev" onclick="prevNext(-1)" title="Previous (←)">◀◀</button>
        <button class="nav-btn" id="btn-next" onclick="prevNext(1)"  title="Next (→)">▶▶</button>
    </div>
    <input type="search" id="search" placeholder="Search stations…" oninput="filter()" autocomplete="off" spellcheck="false">
    <div class="mini-player" id="mini-player">
        <div class="spinner" id="spinner"></div>
        <div class="now-col">
            <div id="now-name">OFFLINE</div>
            <div id="rds-bar">
                <span class="rds-badge">RDS</span>
                <span id="rds-text">—</span>
            </div>
        </div>
        <button class="play-btn" id="btn-play" onclick="togglePlay()">PLAY</button>
        <input type="range" id="vol-slider" min="0" max="1" step="0.02" value="0.7"
               oninput="setVol(this.value)" title="Volume">
    </div>
</header>

<div id="cat-bar"></div>
<div id="content"><div id="grid-root"></div></div>

<!-- DUAL AUDIO ENGINE — preload="none" prevents any auto-buffering -->
<audio id="eng-a" preload="none"></audio>
<audio id="eng-b" preload="none"></audio>

<div id="toast"></div>
<div id="hint">SPACE play/pause · ← → prev/next</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════════════
//  DUAL-ENGINE AUDIO CORE
// ══════════════════════════════════════════════════════════════════════
const engines = [
    document.getElementById('eng-a'),
    document.getElementById('eng-b')
];
let activeIdx  = 0;
let standbyIdx = 1;

const active  = () => engines[activeIdx];
const standby = () => engines[standbyIdx];

function swapEngines() {
    activeIdx  = standbyIdx;
    standbyIdx = activeIdx === 0 ? 1 : 0;  // recompute AFTER swap — bug fixed
}

// ── Volume via GainNode for smoother control ──
let audioCtx = null, gainNode = null, audioCtxReady = false;
function initAudioCtx() {
    if (audioCtxReady) {
        if (audioCtx?.state === 'suspended') audioCtx.resume();
        return;
    }
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioCtx.createGain();
        gainNode.gain.value = parseFloat(document.getElementById('vol-slider').value);
        gainNode.connect(audioCtx.destination);
        engines.forEach(eng => {
            const src = audioCtx.createMediaElementSource(eng);
            src.connect(gainNode);
        });
        audioCtxReady = true;
    } catch(e) {
        audioCtxReady = false;
    }
}

function setVol(v) {
    const f = parseFloat(v);
    if (gainNode && audioCtxReady) {
        gainNode.gain.setTargetAtTime(f, audioCtx.currentTime, 0.05);
    }
    engines.forEach(e => e.volume = f);
}

// ── State ──
let stations         = [];
let currentStation   = null;
let preloadedStation = null;
let currentCategory  = 'ALL';
let favorites        = [];
let retryTimer       = null;
let retryCount       = 0;
const MAX_RETRY      = 3;
const RETRY_DELAY_MS = 4000;

// Safely read favorites from localStorage
try { favorites = JSON.parse(localStorage.getItem('radio_favs') || '[]'); } catch(_) {}

// ── DOM refs ──
const nowName   = document.getElementById('now-name');
const spinner   = document.getElementById('spinner');
const playBtn   = document.getElementById('btn-play');
const rdsBar    = document.getElementById('rds-bar');
const rdsText   = document.getElementById('rds-text');
const miniPlayer = document.getElementById('mini-player');
const toast     = document.getElementById('toast');

// ══════════════════════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg, ms = 3000) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), ms);
}

// ══════════════════════════════════════════════════════════════════════
//  RDS METADATA
// ══════════════════════════════════════════════════════════════════════
let rdsTimer = null;

function parseRadioJarId(url) {
    try {
        const u = new URL(url);
        if (u.hostname.includes('radiojar.com')) {
            const id = u.pathname.split('/').filter(Boolean)[0];
            return id ? { origin: u.origin, id } : null;
        }
    } catch(_) {}
    return null;
}

async function fetchMeta(station) {
    const rj = parseRadioJarId(station.streamer);
    if (rj) {
        try {
            const r = await fetch(`${rj.origin}/${rj.id}/now-playing/`,
                { signal: AbortSignal.timeout(5000) });
            if (r.ok) {
                const d = await r.json();
                const s = d?.song || d?.now_playing?.song;
                if (s) return [s.artist, s.title].filter(Boolean).join(' — ') || null;
                if (d?.title) return d.title;
            }
        } catch(_) {}
    }
    // MediaSession fallback
    const ms = navigator.mediaSession?.metadata;
    if (ms?.title && ms.title !== station.name) {
        return [ms.artist, ms.title].filter(Boolean).join(' — ') || null;
    }
    return null;
}

function setRDS(text) {
    if (!text) return;
    rdsBar.style.display = 'flex';
    rdsText.classList.add('fade');
    setTimeout(() => {
        rdsText.textContent = text;
        rdsText.classList.remove('fade');
    }, 350);
}

function clearRDS() {
    rdsBar.style.display = 'none';
    rdsText.textContent = '—';
}

function startPolling(station) {
    stopPolling();
    clearRDS();
    const poll = async () => {
        if (currentStation?.id !== station.id) return;
        if (document.hidden) return;  // skip when tab is hidden
        const m = await fetchMeta(station);
        if (m && currentStation?.id === station.id) setRDS(m);
    };
    poll();
    rdsTimer = setInterval(poll, 14000);
}

function stopPolling() {
    if (rdsTimer) { clearInterval(rdsTimer); rdsTimer = null; }
}

// ══════════════════════════════════════════════════════════════════════
//  MEDIA SESSION
// ══════════════════════════════════════════════════════════════════════
function updateMediaSession(station) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
        title: station.name, artist: station.category || 'Radio'
    });
    navigator.mediaSession.playbackState = 'playing';
    const handlers = {
        play: togglePlay, pause: togglePlay,
        previoustrack: () => prevNext(-1), nexttrack: () => prevNext(1)
    };
    Object.entries(handlers).forEach(([k, v]) => {
        try { navigator.mediaSession.setActionHandler(k, v); } catch(_) {}
    });
}

// ══════════════════════════════════════════════════════════════════════
//  PLAYBACK UI STATES
// ══════════════════════════════════════════════════════════════════════
function uiLoading(name) {
    nowName.className = '';
    nowName.textContent = name;
    spinner.style.display = 'inline-block';
    playBtn.textContent = 'PAUSE';
    miniPlayer.classList.add('playing');
}

function uiPlaying(name) {
    nowName.textContent = name;
    spinner.style.display = 'none';
}

function uiOffline(name) {
    stopRetry();
    nowName.className = 'offline flash-err';
    // Remove class after animation so it can re-trigger
    setTimeout(() => nowName.classList.remove('flash-err'), 1200);
    nowName.textContent = name ? `✕ ${name}` : 'STREAM OFFLINE';
    spinner.style.display = 'none';
    playBtn.textContent = 'PLAY';
    miniPlayer.classList.remove('playing');
    clearRDS();
    if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
}

// ══════════════════════════════════════════════════════════════════════
//  AUTO-RETRY LOGIC
// ══════════════════════════════════════════════════════════════════════
function stopRetry() {
    if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
    retryCount = 0;
}

function scheduleRetry(station) {
    if (retryCount >= MAX_RETRY) {
        showToast(`⚠ ${station.name} — stream unavailable`, 5000);
        uiOffline(station.name);
        markCardError(station.id);
        return;
    }
    retryCount++;
    const delay = RETRY_DELAY_MS * retryCount;
    showToast(`Reconnecting… (${retryCount}/${MAX_RETRY})`);
    markCardRetrying(station.id);
    retryTimer = setTimeout(() => {
        if (currentStation?.id === station.id) {
            const eng = active();
            eng.src = station.streamer;
            eng.play().catch(() => scheduleRetry(station));
        }
    }, delay);
}

function markCardRetrying(id) { setCardClass(id, 'retrying'); }
function markCardError(id)    { setCardClass(id, 'error'); }
function setCardClass(id, cls) {
    document.querySelectorAll('.card').forEach(c => {
        if (c.dataset.id == id) c.classList.add(cls);
    });
}

// ══════════════════════════════════════════════════════════════════════
//  ENGINE EVENTS
// ══════════════════════════════════════════════════════════════════════
engines.forEach(eng => {
    eng.addEventListener('stalled', () => {
        if (eng !== active() || !currentStation) return;
        scheduleRetry(currentStation);
    });
    eng.addEventListener('error', () => {
        if (eng !== active() || !currentStation) return;
        scheduleRetry(currentStation);
    });
    eng.addEventListener('ended', () => {
        if (eng !== active()) return;
        // Streams shouldn't end — treat as stall
        if (currentStation) scheduleRetry(currentStation);
    });
});

// ══════════════════════════════════════════════════════════════════════
//  PRELOADING
// ══════════════════════════════════════════════════════════════════════
function preloadStation(station) {
    if (!station || station.id === currentStation?.id) return;
    if (station.id === preloadedStation?.id) return;
    preloadedStation = station;
    const eng = standby();
    eng.pause();
    eng.src = station.streamer;
    eng.preload = 'auto';
    // We do NOT call .load() — setting src triggers buffering passively
}

// ══════════════════════════════════════════════════════════════════════
//  PLAY STATION
// ══════════════════════════════════════════════════════════════════════
function playStation(station) {
    initAudioCtx();
    stopRetry();
    stopPolling();

    const isPreloaded = preloadedStation?.id === station.id;

    // Silence & detach current engine
    const cur = active();
    cur.pause();
    cur.removeAttribute('src');
    cur.load(); // release network connection

    swapEngines(); // now active() is the standby engine

    const eng = active();

    if (!isPreloaded) {
        eng.src = station.streamer;
    }
    // else: engine already has src buffered from preload

    currentStation   = station;
    preloadedStation = null;
    retryCount       = 0;

    // Persist last played
    try { localStorage.setItem('radio_last_id', station.id); } catch(_) {}

    updateActiveUI(station.id);
    uiLoading(station.name);
    updateMediaSession(station);

    // Connection timeout guard
    const timeoutId = setTimeout(() => {
        if (currentStation?.id !== station.id) return;
        if (!active().paused) return;
        scheduleRetry(station);
    }, 10000);

    eng.play()
        .then(() => {
            clearTimeout(timeoutId);
            uiPlaying(station.name);
            startPolling(station);
            // Preload next station after a short settling period
            setTimeout(() => {
                const list = getFilteredList();
                const idx  = list.findIndex(s => s.id === station.id);
                if (idx !== -1) preloadStation(list[(idx + 1) % list.length]);
            }, 4000);
        })
        .catch(() => {
            clearTimeout(timeoutId);
            scheduleRetry(station);
        });
}

// ══════════════════════════════════════════════════════════════════════
//  TOGGLE / PREV-NEXT
// ══════════════════════════════════════════════════════════════════════
function togglePlay() {
    initAudioCtx();
    const eng = active();
    if (!eng.src && currentStation) { playStation(currentStation); return; }
    if (!eng.src) return;
    if (eng.paused) {
        spinner.style.display = 'inline-block';
        eng.play()
            .then(() => { spinner.style.display = 'none'; playBtn.textContent = 'PAUSE'; miniPlayer.classList.add('playing'); })
            .catch(() => {});
    } else {
        eng.pause();
        playBtn.textContent = 'PLAY';
        spinner.style.display = 'none';
        miniPlayer.classList.remove('playing');
    }
}

function prevNext(dir) {
    const list = getFilteredList();
    if (!list.length) return;
    const lastId = currentStation?.id ?? (() => { try { return localStorage.getItem('radio_last_id'); } catch(_) {} })();
    let idx = list.findIndex(s => s.id?.toString() === lastId?.toString());
    idx = idx === -1 ? 0 : (idx + dir + list.length) % list.length;
    playStation(list[idx]);
}

function updateActiveUI(id) {
    document.querySelectorAll('.card').forEach(c => {
        c.classList.toggle('active', c.dataset.id == id);
        c.classList.remove('preloading', 'retrying', 'error');
    });
}

// ══════════════════════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT') return;
    if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowLeft')  { e.preventDefault(); prevNext(-1); }
    if (e.code === 'ArrowRight') { e.preventDefault(); prevNext(1); }
});

// ══════════════════════════════════════════════════════════════════════
//  VISIBILITY CHANGE — pause RDS when hidden
// ══════════════════════════════════════════════════════════════════════
document.addEventListener('visibilitychange', () => {
    if (!document.hidden && currentStation && !active().paused) startPolling(currentStation);
});

// ══════════════════════════════════════════════════════════════════════
//  DATA LOADING
// ══════════════════════════════════════════════════════════════════════
function clean(s) { return (s || '').replace(/\u00a0/g, ' ').replace(/\s+/g, ' ').trim(); }

async function loadData() {
    try {
        // No cache-buster — let browser cache the JSON, it's static data
        const r = await fetch('./greek_stations.json');
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const raw = await r.json();

        stations = raw.map((s, i) => ({
            id:       s.sid ?? `g${i}`,
            name:     clean(s.name),
            streamer: s.streamer.trim(),
            category: clean(s.category) || 'Άλλα'
        })).sort((a, b) => a.name.localeCompare(b.name, 'el'));

        buildCatBar();
        render();

        // Restore last played station (don't auto-play — requires user gesture)
        let lastId;
        try { lastId = localStorage.getItem('radio_last_id'); } catch(_) {}
        if (lastId) {
            const s = stations.find(x => x.id.toString() === lastId.toString());
            if (s) {
                currentStation = s;
                nowName.textContent = s.name;
                updateActiveUI(s.id);
            }
        }
    } catch(e) {
        showToast('⚠ Could not load station list', 6000);
        console.error('[Radio] loadData:', e);
    }
}

// ══════════════════════════════════════════════════════════════════════
//  UI — CATEGORY BAR
// ══════════════════════════════════════════════════════════════════════
function buildCatBar() {
    const cats = ['ALL', '⭐ ΑΓΑΠΗΜΕΝΑ',
        ...[...new Set(stations.map(s => s.category))].sort((a,b) => a.localeCompare(b,'el'))
    ];
    const bar = document.getElementById('cat-bar');
    bar.innerHTML = '';
    cats.forEach(c => {
        const chip = document.createElement('div');
        chip.className = 'cat-chip' + (c === currentCategory ? ' active' : '');
        chip.textContent = c;
        chip.addEventListener('click', () => setCategory(c));
        bar.appendChild(chip);
    });
}

function setCategory(cat) {
    currentCategory = cat;
    buildCatBar();
    render();
    document.getElementById('content').scrollTop = 0;
}

// ══════════════════════════════════════════════════════════════════════
//  UI — FAVORITES
// ══════════════════════════════════════════════════════════════════════
function toggleFav(e, name) {
    e.stopPropagation();
    favorites = favorites.includes(name)
        ? favorites.filter(f => f !== name)
        : [...favorites, name];
    try { localStorage.setItem('radio_favs', JSON.stringify(favorites)); } catch(_) {}
    render();
}

// ══════════════════════════════════════════════════════════════════════
//  UI — FILTERING & RENDER
// ══════════════════════════════════════════════════════════════════════
function getFilteredList() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    let list;

    if (currentCategory === '⭐ ΑΓΑΠΗΜΕΝΑ') {
        const seen = new Set();
        list = stations.filter(s => {
            if (favorites.includes(s.name) && !seen.has(s.name)) { seen.add(s.name); return true; }
            return false;
        });
    } else if (currentCategory === 'ALL') {
        list = stations;
    } else {
        list = stations.filter(s => s.category === currentCategory);
    }

    if (!q) return list;
    return list.filter(s => s.name.toLowerCase().includes(q) || s.category.toLowerCase().includes(q));
}

function filter() { render(); }

const CAT_PRIORITY = { 'Αθήνα': 1, 'Θεσσαλονίκη': 2 };

function render() {
    const list = getFilteredList();
    const root = document.getElementById('grid-root');
    root.innerHTML = '';

    if (currentCategory === '⭐ ΑΓΑΠΗΜΕΝΑ') {
        appendSection('⭐ ΤΑ ΑΓΑΠΗΜΕΝΑ ΜΟΥ', list, root);
        return;
    }

    // Group by category
    const groups = {};
    for (const s of list) {
        (groups[s.category] = groups[s.category] || []).push(s);
    }

    Object.keys(groups)
        .sort((a, b) => (CAT_PRIORITY[a]||999) - (CAT_PRIORITY[b]||999) || a.localeCompare(b,'el'))
        .forEach(cat => appendSection(cat, groups[cat], root));
}

// Use DocumentFragment for batch DOM insertion — avoids reflow thrashing
function appendSection(title, list, container) {
    if (!list.length) return;
    const frag = document.createDocumentFragment();
    const sec  = document.createElement('div');
    sec.className = 'cat-section';

    const head = document.createElement('div');
    head.className = 'cat-head';
    head.textContent = `${title} (${list.length})`;
    sec.appendChild(head);

    const grid = document.createElement('div');
    grid.className = 'grid';

    const lastId = (() => { try { return localStorage.getItem('radio_last_id'); } catch(_) {} })();

    for (const s of list) {
        const card = document.createElement('div');
        card.className = 'card';
        if (currentStation?.id == s.id || lastId == s.id) card.classList.add('active');
        card.dataset.id = s.id;

        const nameSpan = document.createElement('span');
        nameSpan.className = 'st-name';
        nameSpan.textContent = s.name;

        const favSpan = document.createElement('span');
        favSpan.className = 'fav-btn' + (favorites.includes(s.name) ? ' on' : '');
        favSpan.textContent = '★';
        favSpan.onclick = e => toggleFav(e, s.name);

        card.appendChild(nameSpan);
        card.appendChild(favSpan);
        card.onclick = () => playStation(s);
        card.addEventListener('mouseenter', () => {
            if (s.id !== currentStation?.id) preloadStation(s);
        }, { passive: true });

        grid.appendChild(card);
    }

    sec.appendChild(grid);
    frag.appendChild(sec);
    container.appendChild(frag);
}

// ══════════════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════════════
loadData();
</script>

<script>
'use strict';

/* ═══════════════════════════════════════════════
   SIMPLE MODERN AUDIO CORE
═══════════════════════════════════════════════ */

const audio = new Audio();
audio.preload = "none";
audio.crossOrigin = "anonymous";

let currentStation = null;
let retryTimer = null;
let retryCount = 0;
const MAX_RETRY = 4;

const nowName   = document.getElementById('now-name');
const spinner   = document.getElementById('spinner');
const playBtn   = document.getElementById('btn-play');
const miniPlayer = document.getElementById('mini-player');

function uiLoading(name){
    nowName.textContent = name;
    spinner.style.display = 'inline-block';
    playBtn.textContent = 'PAUSE';
    miniPlayer.classList.add('playing');
}

function uiPlaying(name){
    spinner.style.display = 'none';
    nowName.textContent = name;
}

function uiOffline(msg){
    spinner.style.display = 'none';
    playBtn.textContent = 'PLAY';
    miniPlayer.classList.remove('playing');
    nowName.textContent = "✕ " + msg;
}

function stopRetry(){
    if(retryTimer) clearTimeout(retryTimer);
    retryTimer = null;
    retryCount = 0;
}

function scheduleRetry(){
    if(retryCount >= MAX_RETRY){
        uiOffline("Stream unavailable");
        return;
    }

    retryCount++;
    const delay = 2000 * retryCount;

    retryTimer = setTimeout(()=>{
        if(currentStation){
            audio.src = currentStation.streamer;
            audio.play().catch(()=>scheduleRetry());
        }
    }, delay);
}

/* ═══════════════════════════════════════════════
   PLAY STATION
═══════════════════════════════════════════════ */

function playStation(station){
    stopRetry();
    currentStation = station;
    retryCount = 0;

    uiLoading(station.name);

    audio.pause();
    audio.src = station.streamer;
    audio.load();

    audio.play()
        .then(()=>uiPlaying(station.name))
        .catch(()=>scheduleRetry());
}

/* ═══════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════ */

audio.addEventListener('playing', ()=>{
    uiPlaying(currentStation?.name || "");
});

audio.addEventListener('error', ()=>{
    scheduleRetry();
});

audio.addEventListener('stalled', ()=>{
    scheduleRetry();
});

audio.addEventListener('ended', ()=>{
    scheduleRetry();
});

/* ═══════════════════════════════════════════════
   CONTROLS
═══════════════════════════════════════════════ */

function togglePlay(){
    if(!audio.src) return;

    if(audio.paused){
        audio.play();
        playBtn.textContent = "PAUSE";
        miniPlayer.classList.add('playing');
    }else{
        audio.pause();
        playBtn.textContent = "PLAY";
        miniPlayer.classList.remove('playing');
    }
}

function setVol(v){
    audio.volume = parseFloat(v);
}

/* expose globally */
window.playStation = playStation;
window.togglePlay  = togglePlay;
window.setVol      = setVol;

</script>

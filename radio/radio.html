<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Purple Pro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050505; --surface:#111; --surface2:#161616;
  --accent:#a371ff; --accent-dim:#2d1d5c; --accent-glow:rgba(163,113,255,0.1);
  --text:#cfcfcf; --text-dim:#444; --border:#1f1f1f; --border2:#2a2a2a;
  --fav:#ffcc00; --error:#ff4444; --green:#3dff8f; --green-bg:#0b2218;
}
*{box-sizing:border-box;margin:0;padding:0;outline:none;-webkit-tap-highlight-color:transparent}
body{
  font-family:'IBM Plex Sans',sans-serif;
  background:var(--bg);color:var(--text);
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
}

/* ── HEADER ── */
header{
  display:flex;gap:8px;align-items:center;
  padding:0 10px;height:56px;
  background:#000;border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.nav-grp{display:flex;gap:3px;flex-shrink:0}
.nav-btn{
  background:var(--surface);border:1px solid var(--border);
  color:var(--accent);cursor:pointer;border-radius:3px;
  padding:0 10px;height:32px;
  font-family:'IBM Plex Mono',monospace;font-size:0.62rem;font-weight:600;
  letter-spacing:.04em;white-space:nowrap;
  transition:background .15s,border-color .15s;
}
.nav-btn:hover{background:var(--accent-dim);border-color:var(--accent)}
.nav-btn:active{transform:scale(.95)}

#search{
  flex:1;min-width:60px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:0 10px;height:32px;border-radius:3px;
  font-family:'IBM Plex Sans',sans-serif;font-size:0.82rem;
  transition:border-color .2s;
}
#search:focus{border-color:var(--accent-dim)}
#search::placeholder{color:var(--text-dim)}

/* ── MINI PLAYER ── */
.player{
  display:flex;align-items:center;gap:8px;
  background:#0a0a0a;padding:0 10px;height:40px;border-radius:4px;
  border:1px solid var(--accent-dim);
  flex:2.5;min-width:0;position:relative;overflow:hidden;
}
.player.playing::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,var(--accent-glow),transparent);
  animation:sweep 3s linear infinite;pointer-events:none;
}
@keyframes sweep{from{transform:translateX(-100%)}to{transform:translateX(200%)}}

.now-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}

#now{
  font-size:0.82rem;font-weight:700;color:var(--accent);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#now.offline{color:var(--error)}

/* RDS row */
#rds-bar{display:none;align-items:center;gap:5px;height:13px}
.rds-badge{
  font-family:'IBM Plex Mono',monospace;font-size:0.5rem;color:var(--green);
  background:var(--green-bg);border:1px solid #1a5e30;
  padding:1px 4px;border-radius:2px;flex-shrink:0;letter-spacing:.05em;
}
#rds-text{
  font-size:0.65rem;color:var(--green);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
  transition:opacity .35s;
}
#rds-text.fade{opacity:0}

/* Spinner */
.spinner{
  width:9px;height:9px;flex-shrink:0;
  border:2px solid var(--accent-dim);border-top-color:var(--accent);
  border-radius:50%;animation:spin .55s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

#play-btn{
  background:var(--accent);border:none;color:#000;
  font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:0.6rem;letter-spacing:.06em;
  padding:0 11px;height:26px;cursor:pointer;border-radius:2px;flex-shrink:0;
  transition:background .15s;
}
#play-btn:hover{background:#b98aff}
#play-btn:active{transform:scale(.95)}

#volume{width:56px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:14px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:#181818;border:1px solid var(--border2);
  color:var(--text);padding:7px 14px;border-radius:4px;
  font-size:0.76rem;font-family:'IBM Plex Mono',monospace;
  transition:transform .28s ease;z-index:999;pointer-events:none;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── CAT BAR ── */
#catbar{
  display:flex;gap:6px;padding:8px 10px;
  overflow-x:auto;white-space:nowrap;
  border-bottom:1px solid var(--border);
  scrollbar-width:none;flex-shrink:0;
}
#catbar::-webkit-scrollbar{display:none}
.cat{
  background:var(--surface);border:1px solid var(--border);
  padding:5px 12px;border-radius:20px;font-size:0.72rem;
  cursor:pointer;color:#666;user-select:none;
  transition:all .15s;
}
.cat:hover{color:var(--text);border-color:#333}
.cat.active{background:var(--accent-dim);color:#fff;border-color:var(--accent)}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;padding:10px}
#content::-webkit-scrollbar{width:4px}
#content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.cat-section{margin-bottom:20px}
.cat-head{
  font-family:'IBM Plex Mono',monospace;font-size:0.57rem;font-weight:600;
  color:var(--accent);text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.cat-head::after{content:'';flex:1;height:1px;background:var(--accent-dim);opacity:.3}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px}

.card{
  background:var(--surface);border:1px solid var(--border);
  padding:9px 10px;border-radius:5px;
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;transition:border-color .15s,background .15s;
}
.card:hover{border-color:var(--border2);background:var(--surface2)}
.card.active{border-color:var(--accent)!important;background:#160f2a!important}
.card.error{border-color:var(--error)!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.card.retrying{animation:pulse 1s ease infinite}

.st-name{font-size:0.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.fav{color:#252525;font-size:1.1rem;padding:0 2px;cursor:pointer;transition:color .15s;flex-shrink:0}
.fav:hover{color:#666}
.fav.on{color:var(--fav)}

#hint{
  position:fixed;bottom:5px;right:10px;
  font-family:'IBM Plex Mono',monospace;font-size:0.5rem;color:#252525;
  pointer-events:none;
}
</style>
</head>
<body>

<header>
  <div class="nav-grp">
    <button class="nav-btn" onclick="prevNext(-1)">◀◀ PREV</button>
    <button class="nav-btn" onclick="prevNext(1)">NEXT ▶▶</button>
  </div>
  <input type="search" id="search" placeholder="Search stations…" autocomplete="off" spellcheck="false">
  <div class="player" id="player-bar">
    <div class="spinner" id="spinner"></div>
    <div class="now-col">
      <div id="now">OFFLINE</div>
      <div id="rds-bar">
        <span class="rds-badge">RDS</span>
        <span id="rds-text">—</span>
      </div>
    </div>
    <button id="play-btn">PLAY</button>
    <input type="range" id="volume" min="0" max="1" step="0.02" value="0.7">
  </div>
</header>

<div id="catbar"></div>
<div id="content"></div>

<div id="toast"></div>
<div id="hint">SPACE · ← →</div>

<script>
'use strict';

/* ── THE PLAYER ENGINE (from the working simple version) ── */
const audio = new Audio();
audio.preload = 'none';
audio.crossOrigin = 'anonymous';
audio.volume = 0.7;

/* ── STATE ── */
let stations = [];
let current  = null;
let category = 'ALL';
let favorites = [];
let retry = 0;
let retryTimer = null;
let rdsTimer = null;

try { favorites = JSON.parse(localStorage.getItem('radio_favs') || '[]'); } catch(_) {}

/* ── DOM ── */
const nowEl      = document.getElementById('now');
const playBtn    = document.getElementById('play-btn');
const volEl      = document.getElementById('volume');
const searchEl   = document.getElementById('search');
const catbarEl   = document.getElementById('catbar');
const contentEl  = document.getElementById('content');
const spinnerEl  = document.getElementById('spinner');
const playerBar  = document.getElementById('player-bar');
const rdsBar     = document.getElementById('rds-bar');
const rdsTextEl  = document.getElementById('rds-text');
const toastEl    = document.getElementById('toast');

/* ── TOAST ── */
let _tt;
function showToast(msg, ms) {
  ms = ms || 2800;
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ toastEl.classList.remove('show'); }, ms);
}

/* ── UI STATES ── */
function uiLoading(name) {
  nowEl.className = '';
  nowEl.textContent = 'Loading ' + name;
  spinnerEl.style.display = 'inline-block';
  playBtn.textContent = 'PAUSE';
  playerBar.classList.add('playing');
}
function uiPlaying(name) {
  nowEl.textContent = name;
  spinnerEl.style.display = 'none';
  playBtn.textContent = 'PAUSE';
}
function uiStopped() {
  spinnerEl.style.display = 'none';
  playBtn.textContent = 'PLAY';
  playerBar.classList.remove('playing');
  clearRDS();
}
function uiError() {
  nowEl.className = 'offline';
  nowEl.textContent = 'Stream unavailable';
  uiStopped();
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'none';
}

/* ── RDS ── */
function setRDS(text) {
  if (!text) return;
  rdsBar.style.display = 'flex';
  rdsTextEl.classList.add('fade');
  setTimeout(function(){ rdsTextEl.textContent = text; rdsTextEl.classList.remove('fade'); }, 350);
}
function clearRDS() {
  rdsBar.style.display = 'none';
  rdsTextEl.textContent = '—';
}
function stopPolling() { clearInterval(rdsTimer); rdsTimer = null; }

function startPolling(station) {
  stopPolling();
  clearRDS();
  function poll() {
    if (!current || current.name !== station.name || document.hidden) return;
    // RadioJar metadata
    try {
      var u = new URL(station.streamer);
      if (u.hostname.indexOf('radiojar.com') !== -1) {
        var id = u.pathname.split('/').filter(Boolean)[0];
        if (id) {
          fetch(u.origin + '/' + id + '/now-playing/')
            .then(function(r){ return r.ok ? r.json() : null; })
            .then(function(d){
              if (!d) return;
              var s = d.song || (d.now_playing && d.now_playing.song);
              var meta = '';
              if (s) meta = [s.artist, s.title].filter(Boolean).join(' — ');
              else if (d.title) meta = d.title;
              if (meta && current && current.name === station.name) setRDS(meta);
            })
            .catch(function(){});
        }
      }
    } catch(_) {}
    // MediaSession fallback
    var ms = navigator.mediaSession && navigator.mediaSession.metadata;
    if (ms && ms.title && ms.title !== station.name) {
      setRDS([ms.artist, ms.title].filter(Boolean).join(' — '));
    }
  }
  poll();
  rdsTimer = setInterval(poll, 14000);
}

/* ── MEDIA SESSION ── */
function setupMediaSession(station) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({ title: station.name, artist: station.category || 'Radio' });
  navigator.mediaSession.playbackState = 'playing';
  try { navigator.mediaSession.setActionHandler('play', togglePlay); } catch(_) {}
  try { navigator.mediaSession.setActionHandler('pause', togglePlay); } catch(_) {}
  try { navigator.mediaSession.setActionHandler('previoustrack', function(){ prevNext(-1); }); } catch(_) {}
  try { navigator.mediaSession.setActionHandler('nexttrack', function(){ prevNext(1); }); } catch(_) {}
}

/* ── RETRY (from simple version) ── */
function stopRetry() {
  clearTimeout(retryTimer);
  retryTimer = null;
  retry = 0;
}

function scheduleRetry() {
  if (retry >= 4) {
    uiError();
    if (current) setCardState(current.name, 'error');
    return;
  }
  retry++;
  showToast('Reconnecting… (' + retry + '/4)');
  if (current) setCardState(current.name, 'retrying');
  retryTimer = setTimeout(function(){
    if (current) playStation(current);
  }, 2000 * retry);
}

function setCardState(name, cls) {
  document.querySelectorAll('.card').forEach(function(c){
    if (c.dataset.name === name) { c.classList.remove('retrying','error'); c.classList.add(cls); }
  });
}

/* ── AUDIO EVENTS (from simple version) ── */
audio.addEventListener('error', scheduleRetry);
audio.addEventListener('stalled', scheduleRetry);
audio.addEventListener('ended', scheduleRetry);

/* ── PLAY STATION (simple version engine) ── */
function playStation(station) {
  stopRetry();
  stopPolling();
  current = station;
  retry = 0;

  audio.pause();
  audio.src = station.streamer;
  audio.load();

  try { localStorage.setItem('radio_last', station.name); } catch(_) {}

  updateActiveUI(station.name);
  uiLoading(station.name);
  setupMediaSession(station);

  audio.play()
    .then(function(){
      uiPlaying(station.name);
      startPolling(station);
      render(); // refresh card highlights
    })
    .catch(function(err){
      if (err && err.name === 'NotAllowedError') {
        // autoplay blocked — just show the name ready to play
        uiStopped();
        nowEl.textContent = station.name;
        nowEl.className = '';
      } else {
        scheduleRetry();
      }
    });
}

/* ── TOGGLE PLAY ── */
function togglePlay() {
  if (!audio.src || !current) return;
  if (audio.paused) {
    audio.play()
      .then(function(){
        playBtn.textContent = 'PAUSE';
        playerBar.classList.add('playing');
        nowEl.className = '';
        nowEl.textContent = current.name;
      })
      .catch(function(){});
  } else {
    audio.pause();
    uiStopped();
    nowEl.textContent = current.name;
    nowEl.className = '';
  }
}

/* ── PREV / NEXT ── */
function prevNext(dir) {
  var list = getFilteredList();
  if (!list.length) return;
  var idx = current ? list.findIndex(function(s){ return s.name === current.name; }) : -1;
  idx = idx === -1 ? 0 : (idx + dir + list.length) % list.length;
  playStation(list[idx]);
}

function updateActiveUI(name) {
  document.querySelectorAll('.card').forEach(function(c){
    c.classList.toggle('active', c.dataset.name === name);
    if (c.dataset.name !== name) c.classList.remove('retrying','error');
  });
}

/* ── KEYBOARD ── */
document.addEventListener('keydown', function(e){
  if (document.activeElement.tagName === 'INPUT') return;
  if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowLeft')  { e.preventDefault(); prevNext(-1); }
  if (e.code === 'ArrowRight') { e.preventDefault(); prevNext(1); }
});

/* ── VISIBILITY ── */
document.addEventListener('visibilitychange', function(){
  if (!document.hidden && current && !audio.paused) startPolling(current);
});

/* ── VOLUME ── */
volEl.oninput = function(){ audio.volume = parseFloat(this.value); };

/* ── LOAD DATA ── */
async function load() {
  try {
    var r = await fetch('./greek_stations.json');
    var raw = await r.json();
    stations = raw.map(function(s){ return { name:(s.name||'').trim(), streamer:(s.streamer||'').trim(), category:(s.category||'Άλλα').trim() }; });
    stations.sort(function(a,b){ return a.name.localeCompare(b.name,'el'); });
    buildCategories();
    render();
    // Restore last played (highlight only)
    var last = null;
    try { last = localStorage.getItem('radio_last'); } catch(_) {}
    if (last) {
      var s = stations.find(function(x){ return x.name === last; });
      if (s) { current = s; nowEl.textContent = s.name; updateActiveUI(s.name); }
    }
  } catch(e) {
    nowEl.textContent = 'Could not load stations';
    console.error(e);
  }
}

/* ── CATEGORIES ── */
function buildCategories() {
  var cats = ['ALL', '⭐ ΑΓΑΠΗΜΕΝΑ'].concat(
    Array.from(new Set(stations.map(function(s){ return s.category; })))
      .sort(function(a,b){ return a.localeCompare(b,'el'); })
  );
  catbarEl.innerHTML = '';
  cats.forEach(function(c){
    var div = document.createElement('div');
    div.className = 'cat' + (c === category ? ' active' : '');
    div.textContent = c;
    div.addEventListener('click', function(){
      category = c;
      buildCategories();
      render();
      contentEl.scrollTop = 0;
    });
    catbarEl.appendChild(div);
  });
}

/* ── FAVORITES ── */
function toggleFav(e, name) {
  e.stopPropagation();
  if (favorites.indexOf(name) !== -1) favorites = favorites.filter(function(f){ return f !== name; });
  else favorites.push(name);
  try { localStorage.setItem('radio_favs', JSON.stringify(favorites)); } catch(_) {}
  render();
}

/* ── FILTER ── */
function getFilteredList() {
  var q = searchEl.value.toLowerCase().trim();
  var list;
  if (category === '⭐ ΑΓΑΠΗΜΕΝΑ') {
    list = stations.filter(function(s){ return favorites.indexOf(s.name) !== -1; });
  } else if (category === 'ALL') {
    list = stations;
  } else {
    list = stations.filter(function(s){ return s.category === category; });
  }
  if (q) list = list.filter(function(s){ return s.name.toLowerCase().indexOf(q) !== -1; });
  return list;
}

/* ── RENDER ── */
var CAT_ORDER = { 'Αθήνα':1, 'Θεσσαλονίκη':2 };

function render() {
  var list = getFilteredList();
  contentEl.innerHTML = '';

  if (category === '⭐ ΑΓΑΠΗΜΕΝΑ') {
    appendSection('⭐ Αγαπημένα', list);
    return;
  }

  // Group by category
  var groups = {};
  list.forEach(function(s){
    (groups[s.category] = groups[s.category] || []).push(s);
  });

  Object.keys(groups)
    .sort(function(a,b){
      return ((CAT_ORDER[a]||99) - (CAT_ORDER[b]||99)) || a.localeCompare(b,'el');
    })
    .forEach(function(cat){ appendSection(cat, groups[cat]); });
}

function appendSection(title, list) {
  if (!list.length) return;

  var sec = document.createElement('div');
  sec.className = 'cat-section';

  var head = document.createElement('div');
  head.className = 'cat-head';
  head.textContent = title + ' (' + list.length + ')';
  sec.appendChild(head);

  var grid = document.createElement('div');
  grid.className = 'grid';

  list.forEach(function(s){
    var card = document.createElement('div');
    card.className = 'card' + (current && current.name === s.name ? ' active' : '');
    card.dataset.name = s.name;

    var name = document.createElement('span');
    name.className = 'st-name';
    name.textContent = s.name;

    var fav = document.createElement('span');
    fav.className = 'fav' + (favorites.indexOf(s.name) !== -1 ? ' on' : '');
    fav.textContent = '★';
    fav.addEventListener('click', function(e){ toggleFav(e, s.name); });

    card.appendChild(name);
    card.appendChild(fav);
    card.addEventListener('click', function(){ playStation(s); });
    grid.appendChild(card);
  });

  sec.appendChild(grid);
  contentEl.appendChild(sec);
}

searchEl.oninput = render;

load();
</script>
</body>
</html>
